[phases.setup]
nixPkgs = ["curl"]

[phases.install]
cmds = [
  "apt-get update -y",
  "apt-get install -y libmagic1",
  "pip install -r requirements.txt"
]

[phases.build]
cmds = [
  "python manage.py collectstatic --noinput",
  "python manage.py migrate --noinput"
]

[start]
cmd = "gunicorn lendogo.wsgi:application"
